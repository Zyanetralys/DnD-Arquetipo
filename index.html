<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Arquetipos</title>
  <style>
    :root{--bg:#050508;--surface:#0f0f16;--border:#1e1e2a;--primary:#00ff9d;--text:#e0e6ed;--muted:#8b9bb4;--dim:#4a5568}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:monospace;background:var(--bg);color:var(--text);padding:1rem;line-height:1.5}
    .grid{max-width:800px;margin:0 auto}
    .hdr{border:1px solid var(--primary);padding:1rem;margin-bottom:1rem;text-align:center}
    .hdr h1{color:var(--primary);font-size:1.2rem;text-transform:uppercase;letter-spacing:2px}
    .screen{display:none}
    .screen.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);padding:1rem;margin-bottom:1rem}
    .btn{background:var(--surface);border:1px solid var(--primary);color:var(--primary);padding:.5rem 1rem;cursor:pointer;font-family:inherit}
    .btn:hover{background:rgba(0,255,157,.1)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .prog{height:4px;background:var(--border);margin:1rem 0}
    .prog-fill{height:100%;background:var(--primary);width:0;transition:width .2s}
    .q-box{padding:1rem;background:rgba(0,255,157,.03);border-left:3px solid var(--primary);margin:1rem 0;min-height:60px}
    .opts{display:grid;grid-template-columns:repeat(5,1fr);gap:.3rem;margin:1rem 0}
    .opt{padding:.6rem;text-align:center;border:1px solid var(--border);cursor:pointer;font-size:.8rem;background:var(--surface)}
    .opt:hover,.opt.sel{border-color:var(--primary);background:rgba(0,255,157,.1);color:var(--primary)}
    .nav{display:flex;justify-content:space-between;margin-top:1rem}
    .res-bar{height:6px;background:var(--border);margin:.3rem 0}
    .res-fill{height:100%;background:var(--primary)}
    pre{white-space:pre-wrap;font-size:.8rem;color:var(--muted);background:var(--surface);padding:1rem;border:1px solid var(--border);max-height:40vh;overflow:auto}
    @media(max-width:600px){.opts{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="grid">
  <header class="hdr">
    <h1>D&D ARQUETIPOS</h1>
    <div style="font-size:.75rem;color:var(--muted)">120 ítems • Escala 1-5</div>
  </header>

  <!-- WELCOME -->
  <section id="welcome" class="screen active">
    <div class="card">
      <p style="margin-bottom:1rem;color:var(--muted)">Responde según tu tendencia natural. Resultados procesados localmente.</p>
      <label style="display:flex;align-items:center;gap:.5rem;margin:1rem 0;font-size:.85rem">
        <input type="checkbox" id="consent">
        <span>Acepto participar para autoconocimiento.</span>
      </label>
      <button id="startBtn" class="btn" style="width:100%" disabled>[ INICIAR ]</button>
    </div>
  </section>

  <!-- ASSESSMENT -->
  <section id="assess" class="screen">
    <div class="prog"><div id="progFill" class="prog-fill"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--dim)">
      <span id="qIdx">1/120</span><span id="qCat">---</span>
    </div>
    <div class="q-box" id="qText">Cargando...</div>
    <div class="opts" id="qOpts"></div>
    <div class="nav">
      <button id="prevBtn" class="btn" disabled>[ ← ]</button>
      <button id="nextBtn" class="btn">[ → ]</button>
    </div>
  </section>

  <!-- LOADING -->
  <section id="loading" class="screen">
    <div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:2rem;margin-bottom:1rem">⟳</div>
      <h3>PROCESANDO...</h3>
      <div id="loadPct" style="color:var(--primary);font-size:1.5rem;margin-top:1rem">0%</div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="screen">
    <div class="card">
      <h3 style="color:var(--primary)">ARQUETIPO PRIMARIO</h3>
      <h2 id="resMain" style="margin:.5rem 0">---</h2>
      <p id="resDesc" style="color:var(--muted);font-size:.9rem">---</p>
      <span id="resCat" style="background:rgba(0,255,157,.1);padding:.2rem .5rem;font-size:.7rem">---</span>
    </div>
    <div class="card">
      <h3>SECUNDARIO</h3>
      <h4 id="resSec">---</h4>
      <p id="resSecDesc" style="color:var(--muted);font-size:.85rem">---</p>
    </div>
    <div class="card">
      <h3>DIMENSIONES</h3>
      <div id="resDims"></div>
    </div>
    <pre id="resReport"></pre>
    <div style="display:flex;gap:.5rem;justify-content:center;margin:1rem 0">
      <button id="dlBtn" class="btn">[ EXPORTAR ]</button>
      <button id="reBtn" class="btn">[ NUEVO ]</button>
    </div>
  </section>
</div>

// ===== INICIALIZACIÓN =====
window.onload=function(){
  // Consentimiento
  const consent=E('consent'),startBtn=E('startBtn');
  if(consent&&startBtn){
    startBtn.disabled=!consent.checked;
    consent.onchange=function(){startBtn.disabled=!this.checked};
    startBtn.onclick=function(){show('assess');render();upd()};
  }
  
  // Navegación
  if(E('prevBtn'))E('prevBtn').onclick=prev;
  if(E('nextBtn'))E('nextBtn').onclick=next;
  if(E('dlBtn'))E('dlBtn').onclick=dl;
  if(E('reBtn'))E('reBtn').onclick=function(){location.reload()};
  
  // Opciones - evento directo en contenedor
  if(E('qOpts')){
    E('qOpts').onclick=function(e){
      const opt=e.target.closest('.opt');
      if(opt&&opt.dataset.v)answer(+opt.dataset.v);
    };
  }
  
  // Teclado
  document.onkeydown=function(e){
    if(E('assess').className.indexOf('active')<0)return;
    if(e.key>='1'&&e.key<='5'){e.preventDefault();answer(+e.key)}
    if(e.key==='ArrowLeft'){e.preventDefault();prev()}
    if(e.key==='ArrowRight'){e.preventDefault();next()}
  };
  
  // Cargar progreso
  try{
    const p=JSON.parse(localStorage.getItem('dnd')||'null');
    if(p&&p.a&&p.a.length===120){st=p;show('assess');render();upd()}
  }catch(err){}
};

// ===== NAVEGACIÓN =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.className=s.className.replace(' active',''));
  E(id).className+=' active';
}

function prev(){if(st.i>0){st.i--;render();upd()}}

function next(){
  if(!st.a[st.i]){alert('Selecciona una respuesta');return}
  if(st.i>=119){finish()}else{st.i++;render();upd()}
}

function answer(v){
  st.a[st.i]={q:Q[st.i].id,v:v,t:Date.now()};
  try{localStorage.setItem('dnd',JSON.stringify(st))}catch(e){}
  // Resaltar visualmente
  const opts=E('qOpts').querySelectorAll('.opt');
  opts.forEach(o=>o.className=o.className.replace(' sel',''));
  opts[v-1].className+=' sel';
  // Avanzar
  setTimeout(function(){
    if(st.i>=119){finish()}else{st.i++;render();upd()}
  },100);
}

function render(){
  const q=Q[st.i],a=st.a[st.i];
  E('qIdx').textContent=(st.i+1)+'/120';
  const cm={VAL:'Validez',STR:'Fuerza',INT:'Intelecto',CHA:'Carisma',WIS:'Moral',DEX:'Sigilo',CON:'Resiliencia',LEAD:'Liderazgo',NAT:'Naturaleza',TEC:'Técnica',SHD:'Sombra',SUP:'Soporte',SWT:'Versatilidad'};
  E('qCat').textContent=cm[q.c]||q.c;
  E('qText').textContent=q.t;
  const labels=['Total desacuerdo','En desacuerdo','Neutral','De acuerdo','Total acuerdo'];
  E('qOpts').innerHTML=[1,2,3,4,5].map(x=>'<div class="opt'+(a&&a.v===x?' sel':'')+'" data-v="'+x+'"><strong>'+x+'</strong><br><small>'+labels[x-1]+'</small></div>').join('');
}

function upd(){
  const n=st.a.filter(x=>x).length;
  E('progFill').style.width=(n/120*100)+'%';
  E('prevBtn').disabled=st.i===0;
  E('nextBtn').textContent=st.i===119?'[ FINALIZAR ]':'[ → ]';
}

// ===== SCORING =====
function finish(){
  if(st.a.filter(x=>x).length<96){alert('Mínimo 96 ítems');return}
  show('loading');
  let p=0;
  const iv=setInterval(function(){p+=5;E('loadPct').textContent=Math.min(100,p)+'%';if(p>=100)clearInterval(iv)},20);
  setTimeout(calc,600);
}

function calc(){
  // Raw scores
  const raw={};
  for(var k in SCALES){
    var s=0;
    for(var j=0;j<SCALES[k].i.length;j++){
      var q=SCALES[k].i[j],a=st.a[q.id-1];
      if(!a)continue;
      var v=a.v;
      if(q.r)v=6-v;
      s+=v*q.w;
    }
    raw[k]=s;
  }
  
  // T-scores
  const t={};
  for(var k in raw){
    var sc=SCALES[k],max=Math.max(1,sc.i.reduce(function(a,b){return a+5*b.w},0));
    var norm=raw[k]/max;
    t[k]=Math.min(80,Math.max(20,Math.round(20+norm*60)));
  }
  
  // Validity
  var valid=true,msg="";
  if(t.VAL>65){valid=false;msg="Posible idealización de respuestas."}
  
  // Archetype scores
  var scored=ARCH.map(function(ar){
    var sc=50;
    for(var k in ar.w){sc+=(t[k]||50-50)*ar.w[k]}
    var r=Math.round(sc),p=Math.min(100,Math.max(5,Math.round(r)));
    return{id:ar.id,n:ar.n,cat:ar.cat,d:ar.d,raw:r,pct:p};
  });
  scored.sort(function(a,b){return b.raw-a.raw});
  var top5=scored.slice(0,5),maxP=top5[0].pct||1;
  top5.forEach(function(r){r.pct=Math.round(r.pct/maxP*100)});
  
  // Report
  var dims=Object.entries(t).filter(function(x){return x[0]!='VAL'}).sort(function(a,b){return b[1]-a[1]}).slice(0,4);
  var lb={STR:'Fuerza',INT:'Intelecto',CHA:'Carisma',WIS:'Moral',DEX:'Sigilo',CON:'Resiliencia',LEAD:'Liderazgo',NAT:'Naturaleza',TEC:'Técnica',SHD:'Sombra',SUP:'Soporte',SWT:'Versatilidad'};
  var rep='PERFIL: '+top5[0].n+'\nCategoria: '+top5[0].cat+'\nAfinidad: '+top5[0].pct+'%\n\nDIMENSIONES:\n'+dims.map(function(d){var l=d[1]<40?'Bajo':d[1]>60?'Alto':'Promedio';return'  • '+lb[d[0]]+': '+d[1]+'T ('+l+')'}).join('\n')+'\n\nSECUNDARIO: '+(top5[1]?top5[1].n+' ('+top5[1].pct+'%)':'N/A')+'\n\nNota: Evaluación orientativa.';
  
  st.r={top5:top5,primary:top5[0],secondary:top5[1]||null,t:t,valid:valid,msg:msg,rep:rep,conf:valid?.88:.45,date:Date.now()};
  try{localStorage.setItem('dnd_res',JSON.stringify(st.r))}catch(e){}
  showRes();
}

function showRes(){
  var r=st.r;
  E('resMain').textContent=r.primary.n;
  E('resCat').textContent=r.primary.cat;
  E('resDesc').textContent=r.primary.d;
  E('resSec').textContent=r.secondary?r.secondary.n+' ('+r.secondary.pct+'%)':'No determinado';
  E('resSecDesc').textContent=r.secondary?r.secondary.d:'---';
  
  var dims=Object.entries(r.t).filter(function(x){return x[0]!='VAL'});
  E('resDims').innerHTML=dims.map(function(d){
    var w=Math.min(100,(d[1]-20)*1.67);
    return'<div style="display:flex;align-items:center;gap:.5rem;font-size:.8rem;margin:.2rem 0"><span style="width:100px;color:var(--muted)">'+d[0]+'</span><div class="res-bar"><div class="res-fill" style="width:'+w+'%"></div></div><span>'+d[1]+'T</span></div>';
  }).join('');
  
  E('resReport').textContent=r.rep;
  show('results');
}

function dl(){
  if(!st.r){alert('Sin resultados');return}
  var b=new Blob([st.r.rep],{type:'text/plain'}),u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='dnd-'+Date.now()+'.txt';a.click();URL.revokeObjectURL(u);
}
</script>
</body>
</html>
