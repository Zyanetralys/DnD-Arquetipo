// ===== ESTADO =====
let S={a:[],i:0,sid:null,res:null};
const $=id=>document.getElementById(id);
const save=(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d))}catch(e){}};
const load=k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}};

// ===== INICIALIZACIÓN =====
function init(){
  S.sid=Date.now().toString(36);
  S.a=new Array(120).fill(null);
  S.i=0;
  S.res=null;
  
  // Consentimiento
  const consent=$('consent');
  const startBtn=$('btn-start');
  if(consent && startBtn){
    startBtn.disabled=!consent.checked;
    consent.onchange=e=>{startBtn.disabled=!e.target.checked};
  }
  
  // Botones principales
  if($('btn-start')) $('btn-start').onclick=start;
  if($('btn-prev')) $('btn-prev').onclick=prev;
  if($('btn-next')) $('btn-next').onclick=next;
  if($('btn-dl')) $('btn-dl').onclick=dl;
  if($('btn-re')) $('btn-re').onclick=()=>location.reload();
  
  // Delegación de eventos para opciones (CORREGIDO)
  const opts=$('q-opts');
  if(opts){
    opts.onclick=e=>{
      const opt=e.target.closest('.opt');
      if(opt && opt.dataset.v){
        e.stopPropagation();
        handleAnswer(+opt.dataset.v);
      }
    };
  }

  // Teclado
  document.addEventListener('keydown',e=>{
    if(!$('s-assess') || !$('s-assess').classList.contains('active')) return;
    if(e.key>='1' && e.key<='5'){
      e.preventDefault();
      handleAnswer(+e.key);
    }
    if(e.key==='ArrowLeft') {e.preventDefault(); prev();}
    if(e.key==='ArrowRight') {e.preventDefault(); next();}
  });

  // Cargar progreso guardado
  const p=load('dnd_prog');
  if(p && Array.isArray(p.a) && typeof p.i==='number'){
    S=p;
    show('s-assess');
    render();
    upd();
  } else {
    show('s-welcome');
  }
}

// ===== NAVEGACIÓN =====
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=$(id);
  if(el) el.classList.add('active');
}

function start(){
  show('s-assess');
  render();
  upd();
}

function prev(){
  if(S.i>0){
    S.i--;
    render();
    upd();
  }
}

function next(){
  const current=S.a[S.i];
  if(!current){
    alert('Selecciona una respuesta para continuar');
    return;
  }
  if(S.i>=119){
    finish();
  } else {
    S.i++;
    render();
    upd();
  }
}

// ===== RESPUESTAS (CORREGIDO) =====
function handleAnswer(value){
  // Guardar respuesta
  S.a[S.i]={qid:Q[S.i].id, v:value, ts:Date.now()};
  save('dnd_prog',S);
  
  // Actualizar UI inmediatamente (resaltar selección)
  renderOptionsHighlight(value);
  
  // Avanzar tras breve feedback visual
  setTimeout(()=>{
    if(S.i>=119){
      finish();
    } else {
      S.i++;
      render();
      upd();
    }
  }, 120);
}

// Resaltar opción seleccionada sin re-renderizar todo
function renderOptionsHighlight(selected){
  const opts=$('q-opts');
  if(!opts) return;
  opts.querySelectorAll('.opt').forEach(opt=>{
    const v=+opt.dataset.v;
    opt.classList.toggle('sel', v===selected);
  });
}

// Renderizar pregunta completa
function render(){
  const q=Q[S.i];
  const a=S.a[S.i];
  if(!q) return;
  
  const idx=$('q-idx');
  const dom=$('q-dom');
  const txt=$('q-text');
  const opts=$('q-opts');
  
  if(idx) idx.textContent=`Ítem ${S.i+1}/120`;
  
  const cm={VAL:'Validez',STR:'Fuerza/Impulso',INT:'Intelecto',CHA:'Carisma',WIS:'Moral/Resistencia',DEX:'Sigilo',CON:'Resiliencia',LEAD:'Liderazgo',NAT:'Naturaleza',TEC:'Técnica',SHD:'Sombra',SUP:'Soporte',SWT:'Versatilidad'};
  if(dom) dom.textContent=cm[q.c]||q.c;
  if(txt) txt.textContent=q.t;
  
  if(opts){
    const labels=['Total desacuerdo','En desacuerdo','Neutral','De acuerdo','Total acuerdo'];
    opts.innerHTML=[1,2,3,4,5].map(v=>
      `<div class="opt ${a?.v===v?'sel':''}" data-v="${v}">
        <strong>${v}</strong><br><small>${labels[v-1]}</small>
      </div>`
    ).join('');
  }
}

function upd(){
  const ans=S.a.filter(x=>x!==null).length;
  const prog=$('prog-fill');
  const prevBtn=$('btn-prev');
  const nextBtn=$('btn-next');
  const val=$('q-val');
  
  if(prog) prog.style.width=`${ans/120*100}%`;
  if(prevBtn) prevBtn.disabled=S.i===0;
  if(nextBtn) nextBtn.textContent=S.i===119?'[ FINALIZAR ]':'[ → ]';
  if(val) val.textContent=ans<15?'Validez: Pendiente':ans<40?'Validez: Verificando':'Validez: OK';
}

// ===== SCORING =====
function finish(){
  const answered=S.a.filter(x=>x!==null).length;
  if(answered<96){
    alert(`Debes responder al menos 96 ítems. Actuales: ${answered}`);
    return;
  }
  
  show('s-load');
  
  // Animación de carga
  let pct=0;
  const iv=setInterval(()=>{
    pct+=3;
    const el=$('load-pct');
    if(el) el.textContent=`${Math.min(100,pct)}%`;
    if(pct>=100) clearInterval(iv);
  }, 25);
  
  setTimeout(()=>{
    const r=calc();
    S.res=r;
    showRes(r);
    save('dnd_res',r);
  }, 900);
}

function calc(){
  // 1. Raw scores por escala
  const raw={};
  Object.entries(SCALES).forEach(([k,scale])=>{
    let sum=0;
    scale.items.forEach(q=>{
      const a=S.a[q.id-1];
      if(!a) return;
      let v=a.v;
      if(q.r===1) v=6-v; // reverse scoring
      sum+=v*q.w;
    });
    raw[k]=sum;
  });

  // 2. T-score normalization
  const tScores={};
  Object.entries(raw).forEach(([k,val])=>{
    const scale=SCALES[k];
    if(!scale) return;
    const max=Math.max(1, scale.items.reduce((acc,q)=>acc+5*q.w, 0));
    const norm=val/max;
    tScores[k]=Math.min(80, Math.max(20, Math.round(20+norm*60)));
  });

  // 3. Validity check
  const valScore=tScores.VAL||50;
  let valid=true, vMsg="";
  if(valScore>65){valid=false; vMsg="Posible idealización de respuestas (Escala L elevada).";}
  if((tScores.INT||50)>70 && (tScores.SHD||50)<30 && (tScores.CON||50)>70){valid=false; vMsg="Perfil contradictorio detectado (Escala F elevada).";}

  // 4. Archetype scoring
  const scored=ARCH.map(arch=>{
    let score=50;
    Object.entries(arch.w||{}).forEach(([scale,weight])=>{
      const t=tScores[scale]||50;
      score+=(t-50)*weight;
    });
    const rawScore=Math.round(score);
    return{
      ...arch,
      raw:rawScore,
      pct:Math.min(100, Math.max(5, Math.round((rawScore/100)*100)))
    };
  });
  
  scored.sort((a,b)=>b.raw-a.raw);
  const top5=scored.slice(0,5);
  const maxP=top5[0]?.pct||1;
  top5.forEach(r=>{r.pct=Math.round(r.pct/maxP*100)});

  // 5. Report generation
  const dims=Object.entries(tScores)
    .filter(([k])=>k!=='VAL')
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);
    
  const labels={STR:'Fuerza/Impulso',INT:'Intelecto/Análisis',CHA:'Carisma/Influencia',WIS:'Moral/Resistencia',DEX:'Sigilo/Adaptación',CON:'Resiliencia/Riesgo',LEAD:'Liderazgo/Autoridad',NAT:'Naturaleza/Equilibrio',TEC:'Técnica/Ingenio',SHD:'Sombra/Ocultamiento',SUP:'Soporte/Empatía',SWT:'Versatilidad/Cambio'};
  
  let report=`═══════════════════════════════════════════
  INFORME DE PERFIL: ${(top5[0]?.n||'N/A').toUpperCase()}
═══════════════════════════════════════════

PERFIL PRIMARIO: ${top5[0]?.n||'N/A'}
   Categoría: ${top5[0]?.cat||'N/A'}
   Afinidad: ${top5[0]?.pct||0}%
   Descriptores: ${top5[0]?.d||''}

DIMENSIONES DESTACADAS:
${dims.map(([k,v])=>{
  const lvl=v<40?'Bajo':v>60?'Alto':'Promedio';
  return `   • ${labels[k]||k}: ${v}T (${lvl})`;
}).join('\n')}

ARQUETIPO SECUNDARIO: ${top5[1]?.n||'N/A'} (${top5[1]?.pct||0}%)
   Sinergia potencial con rol primario para multiclase o rolear dualidad.

OBSERVACIONES CLÍNICAS:
   • Patrón de respuesta: ${valid?'Consistente':'Cuestionable'}
   • Tendencia dominante: ${(tScores.STR||50)>(tScores.INT||50)?'Orientación a acción':'Orientación a análisis'}
   • Estilo operativo: ${(tScores.DEX||50)>(tScores.LEAD||50)?'Preferencia indirecta':'Preferencia directa'}
   • Margen de error estimado: ±8%

NOTA: Evaluación psicométrica adaptada. Resultados orientativos.`;

  return{
    top5,
    primary:top5[0]||null,
    secondary:top5[1]||null,
    tScores,
    valid,
    vMsg,
    report,
    conf:valid?0.88:0.45,
    date:Date.now()
  };
}

// ===== RESULTADOS =====
function showRes(r){
  if(!r) return;
  
  const els={
    main:$('res-main'), cat:$('res-cat'), desc:$('res-desc'),
    sec:$('res-sec'), secDesc:$('res-sec-desc'),
    dims:$('res-dims'), report:$('res-report'),
    conf:$('res-conf'), date:$('res-date'),
    alert:$('val-alert'), alertMsg:$('val-msg')
  };
  
  if(els.main) els.main.textContent=r.primary?.n||'---';
  if(els.cat) els.cat.textContent=r.primary?.cat||'---';
  if(els.desc) els.desc.textContent=r.primary?.d||'---';
  
  if(els.sec){
    els.sec.textContent=r.secondary?`${r.secondary.n} (${r.secondary.pct}%)`:'No determinado';
  }
  if(els.secDesc){
    els.secDesc.textContent=r.secondary?r.secondary.d:'Perfil secundario insuficiente para mapeo.';
  }
  
  if(els.dims){
    els.dims.innerHTML=Object.entries(r.tScores||{})
      .filter(([k])=>k!=='VAL')
      .map(([k,v])=>{
        const w=Math.min(100,(v-20)*1.67);
        return`<div style="display:flex;align-items:center;gap:.8rem;font-size:.8rem;margin:.3rem 0">
          <span style="width:140px;color:var(--muted)">${k}</span>
          <div class="res-bar"><div class="res-fill" style="width:${w}%"></div></div>
          <span style="min-width:30px;text-align:right">${v}T</span>
        </div>`;
      }).join('');
  }
  
  if(els.report) els.report.textContent=r.report||'Generando informe...';
  if(els.conf) els.conf.textContent=`${Math.round((r.conf||0)*100)}%`;
  if(els.date) els.date.textContent=new Date(r.date||Date.now()).toLocaleDateString('es-ES');
  
  if(els.alert && els.alertMsg && !r.valid){
    els.alert.style.display='block';
    els.alertMsg.textContent=r.vMsg||'Protocolo cuestionable';
  }
  
  show('s-res');
  window.scrollTo(0,0);
}

function dl(){
  if(!S.res){alert('Sin resultados para exportar'); return;}
  const b=new Blob([S.res.report||''],{type:'text/plain'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;
  a.download=`dnd-perfil-${Date.now()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(u);
}

// ===== START =====
document.addEventListener('DOMContentLoaded', init);
</script>
